site_name: Equipe Carol Shaw - NoFluxoUNB - Avaliação de Qualidade
site_description: Documentação do projeto de avaliação de qualidade do sistema NoFluxoUNB

repo_name: "2026-1_T02_CAROL_SHAW"
repo_url: "https://github.com/FCTE-Qualidade-de-Software-1/2026-1_T02_CAROL_SHAW"
site_url: "https://fcte-qualidade-de-software-1.github.io/2026-1_T02_CAROL_SHAW/"

docs_dir: docs
site_dir: site

theme:
  name: material
  language: pt-BR
  logo: assets/img/favicon.svg
  favicon: assets/img/favicon.svg
  
  font:
    text: Poppins
    code: JetBrains Mono

  palette:
    # Dark mode — Premium NoFluxo (Violeta + Preto profundo)
    - scheme: slate
      primary: deep purple
      accent: purple
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/brightness-7
        name: Alternar para modo claro

    # Light mode
    - scheme: default
      primary: deep purple
      accent: purple
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/brightness-4
        name: Alternar para modo escuro

    # System preference
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Seguir preferência do sistema

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - header.autohide
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang: pt

nav:
  - Home: index.md

  - Projeto:
      - Visão Geral: projeto/visao_geral.md
      - Requisitante e Partes Interessadas: projeto/stakeholders.md

  - Planejamento (Fase 1):
      - Propósito e Escopo: fase1/proposito_escopo.md
      - Modelo de Qualidade: fase1/modelo_qualidade.md
      - Características: fase1/caracteristicas.md

  - Sustentabilidade:
      - ODS e Metas: impacto/ods.md

  - Administrativo:
      - Contribuição: adm/contribuicao.md
      - Declaração de IA: adm/ia.md
      - Rastreabilidade: adm/links.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets

  - admonition
  - footnotes
  - attr_list
  - md_in_html

extra:
  generator: false
  
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FCTE-Qualidade-de-Software-1/2026-1_T02_CAROL_SHAW

  homepage: /

copyright: >
  © 2026 Equipe Carol Shaw — NoFluxoUNB

extra_css:
  - stylesheets/extra.css
  - https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@300;400;500;600;700&display=swap

extra_javascript:
  - javascripts/extra.js