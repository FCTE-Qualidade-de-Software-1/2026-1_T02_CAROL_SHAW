site_name: Equipe Carol Shaw - NoFluxoUNB - Avaliação de Qualidade
site_description: Documentação do projeto de avaliação de qualidade do sistema NoFluxoUNB

repo_name: "2026-1_T02_CAROL_SHAW"
repo_url: "https://github.com/FCTE-Qualidade-de-Software-1/2026-1_T02_CAROL_SHAW"
site_url: "https://fcte-qualidade-de-software-1.github.io/2026-1_T02_CAROL_SHAW/"

docs_dir: docs
site_dir: site

theme:
  name: material
  language: pt-BR

  logo: assets/img/favicon.svg
  favicon: assets/img/favicon.svg

  font:
    text: Poppins
    code: JetBrains Mono

  palette:
    # Dark mode — inspirado no NoFluxo
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

    # Light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer

    - toc.integrate
    - toc.follow

    - search.highlight
    - search.share
    - search.suggest

    - content.code.copy
    - content.tabs.link

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang: pt

nav:
  - Home: index.md

  - Planejamento (Fase 1):
      - Descrição do Produto: fase1/descricao_produto.md
      - Requisitante e Partes Interessadas: projeto/stakeholders.md
      - Propósito e Escopo: fase1/proposito_escopo.md
      - Modelo de Qualidade: fase1/modelo_qualidade.md

  - Especificação (Fase 2):
      - Introdução: fase2/introducao.md
      - Adequação Funcional: fase2/adequacao_funcional.md
      - Manutenibilidade: fase2/manutenibilidade.md

  - Projeto da Avaliação (Fase 3):
      - Introdução: fase3/introducao.md
      - Adequação Funcional: fase3/adequacao_funcional.md
      - Manutenibilidade: fase3/manutenibilidade.md

  - Execução da Avaliação (Fase 4):
      - Introdução: fase4/introducao.md
      - Adequação Funcional: fase4/adequacao_funcional.md
      - Manutenibilidade: fase4/manutenibilidade.md
      - Evidências:
          - Rastreabilidade da CRF: fase4/evidencias/crf.md
          - Execução da CF: fase4/evidencias/cf.md
          - Inventário da M1: fase4/evidencias/m1.md
          - Mapa de Dependências da M5: fase4/evidencias/m5.md
          - Execução dos Testes: fase4/evidencias/testes.md

  - Sustentabilidade:
      - ODS e Metas: impacto/ods.md

  - Administrativo:
      - Contribuição: adm/contribuicao.md
      - Declaração de IA: adm/ia.md

markdown_extensions:
  # HTML
  - md_in_html
  - attr_list

  # Admonitions / dropdowns
  - admonition
  - pymdownx.details

  # Code blocks
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.inlinehilite
  - pymdownx.snippets

  - pymdownx.arithmatex:
      generic: true

  # Tabs
  - pymdownx.tabbed:
      alternate_style: true

  # Extras
  - footnotes

  # TOC
  - toc:
      permalink: true

extra:
  generator: false

  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FCTE-Qualidade-de-Software-1/2026-1_T02_CAROL_SHAW

  homepage: /

copyright: >
  © 2026 Equipe Carol Shaw — NoFluxoUNB

extra_css:
  - stylesheets/extra.css
  - https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@300;400;500;600;700&display=swap

extra_javascript:
  - javascripts/extra.js
  - https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
